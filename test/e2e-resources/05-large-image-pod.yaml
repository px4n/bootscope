apiVersion: v1
kind: Pod
metadata:
  name: large-image-pod
  namespace: bootscope-test
spec:
  containers:
    - name: large-app
      # Using a known large image for testing
      image: pytorch/pytorch:latest
      command: ["sh", "-c", "echo 'Large image loaded' && sleep 3600"]
      resources:
        requests:
          memory: "256Mi"
          cpu: "100m"
        limits:
          memory: "512Mi"
          cpu: "200m"
