apiVersion: v1
kind: Pod
metadata:
  name: slow-startup-pod
  namespace: bootscope-test
spec:
  initContainers:
    - name: slow-init
      image: busybox:1.28
      command: ["sh", "-c", "echo 'Simulating slow initialization' && sleep 30"]
      resources:
        requests:
          memory: "32Mi"
          cpu: "25m"
        limits:
          memory: "64Mi"
          cpu: "50m"
  containers:
    - name: slow-app
      image: busybox:1.28
      command: ["sh", "-c", "echo 'Simulating slow app startup' && sleep 20 && echo 'App ready' && sleep 3600"]
      resources:
        requests:
          memory: "64Mi"
          cpu: "50m"
        limits:
          memory: "128Mi"
          cpu: "100m"
      readinessProbe:
        exec:
          command:
            - sh
            - -c
            - test -f /tmp/ready
        initialDelaySeconds: 20
        periodSeconds: 5
      lifecycle:
        postStart:
          exec:
            command:
              - sh
              - -c
              - sleep 20 && touch /tmp/ready
