apiVersion: v1
kind: Pod
metadata:
  name: multi-container-pod
  namespace: bootscope-test
spec:
  containers:
    - name: frontend
      image: nginx:alpine
      ports:
        - containerPort: 80
      resources:
        requests:
          memory: "64Mi"
          cpu: "50m"
        limits:
          memory: "128Mi"
          cpu: "100m"
    - name: backend
      image: busybox:1.28
      command: ["sh", "-c", "echo Backend service running && sleep 3600"]
      resources:
        requests:
          memory: "32Mi"
          cpu: "25m"
        limits:
          memory: "64Mi"
          cpu: "50m"
    - name: sidecar
      image: busybox:1.28
      command: ["sh", "-c", "echo Sidecar monitoring && sleep 3600"]
      resources:
        requests:
          memory: "32Mi"
          cpu: "25m"
        limits:
          memory: "64Mi"
          cpu: "50m"
