apiVersion: apps/v1
kind: Deployment
metadata:
  name: bootscope-test-app
  namespace: bootscope-test
spec:
  replicas: 5
  selector:
    matchLabels:
      app: bootscope-test
  template:
    metadata:
      labels:
        app: bootscope-test
    spec:
      initContainers:
        - name: init
          image: busybox:1.28
          command: ["sh", "-c", "sleep 3"]
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "50m"
      containers:
        - name: app
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
