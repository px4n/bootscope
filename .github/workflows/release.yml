name: Release

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: "Release"
    runs-on: ubuntu-latest
    steps:
      - name: Generate GH app token for release-bot
        id: generate_token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.RELEASE_BOT_ID }}
          private_key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.generate_token.outputs.token }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.10"

      - name: Install tools
        run: |
          go install github.com/caarlos0/svu@latest
          go install github.com/git-chglog/git-chglog/cmd/git-chglog@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Get next version
        id: get_version
        run: |
          # Get the current version
          CURRENT_VERSION=$(svu current || echo "v0.0.0")
          echo "Current version: $CURRENT_VERSION"

          # Show what type of version bump will happen
          echo "Version bump type:"
          if [ "$CURRENT_VERSION" != "v0.0.0" ]; then
            svu next --strip-prefix || true
            echo "Major version: $(svu major --strip-prefix)"
            echo "Minor version: $(svu minor --strip-prefix)"
            echo "Patch version: $(svu patch --strip-prefix)"
          fi

          # Get the next version based on conventional commits
          # svu analyzes commits since last tag and determines version bump
          NEXT_VERSION=$(svu next || echo "v0.1.0")
          echo "Next version: $NEXT_VERSION"

          # Check if there are changes that warrant a release
          if [ "$CURRENT_VERSION" = "$NEXT_VERSION" ]; then
            echo "No version bump needed, skipping release"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Update changelog and create tag
        if: steps.get_version.outputs.skip != 'true'
        run: |
          # Generate CHANGELOG.md
          git-chglog -o CHANGELOG.md --next-tag ${{ steps.get_version.outputs.version }}

          # Configure git with release-bot app credentials
          git config user.name "px4n-release-bot[bot]"
          git config user.email "px4n-release-bot[bot]@users.noreply.github.com"

          # Set the remote URL to use the token
          git remote set-url origin https://x-access-token:${{ steps.generate_token.outputs.token }}@github.com/${{ github.repository }}.git

          # Commit changelog if it changed
          if [[ $(git status --porcelain CHANGELOG.md) ]]; then
            git add CHANGELOG.md
            git commit -m "docs: update CHANGELOG.md for ${{ steps.get_version.outputs.version }}"
            git push
          fi

          # Create and push tag
          git tag ${{ steps.get_version.outputs.version }} -m "Release ${{ steps.get_version.outputs.version }}"
          git push origin ${{ steps.get_version.outputs.version }}

      - name: Run GoReleaser
        if: steps.get_version.outputs.skip != 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean --parallelism 4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup-caches:
    name: "Cleanup Caches"
    runs-on: ubuntu-latest
    needs: [release]
    if: always()
    permissions:
      actions: write
    steps:
      - name: Cleanup old caches
        run: |
          echo "Cleaning up old caches..."

          # Get all caches
          CACHES=$(gh api repos/${{ github.repository }}/actions/caches --jq '.actions_caches[].id')

          # Delete each cache
          for cache_id in $CACHES; do
            echo "Deleting cache $cache_id"
            gh api -X DELETE repos/${{ github.repository }}/actions/caches/$cache_id || true
          done

          echo "Cache cleanup complete"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
